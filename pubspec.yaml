name: inventory_system
description: Inventory Management System with offline/online support
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local Database
  drift: ^2.23.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.28

  # Remote Backend
  supabase_flutter: ^2.8.4

  # Routing
  go_router: ^14.6.3

  # Data Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  data_table_2: ^2.7.2
  fl_chart: ^0.69.0

  # Utilities
  intl: ^0.20.2
  shared_preferences: ^2.3.5
  file_picker: ^8.3.7
  path_provider: ^2.1.5
  path: ^1.9.0
  uuid: ^4.5.1
  crypto: ^3.0.6

  # Notifications / Scheduled backup
  flutter_local_notifications: ^18.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  drift_dev: ^2.23.1

flutter:
  uses-material-design: true
